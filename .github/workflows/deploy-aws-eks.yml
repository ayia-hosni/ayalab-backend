name: Deploy Backend to AWS EKS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ayalab-backend
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # Use the git SHA as the image tag — never use :latest in production
          # This makes every deployment traceable to an exact commit
          IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to EKS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Apply namespace and config
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml

      - name: Apply secrets
        run: |
          kubectl create secret generic postgres-secret \
            --from-literal=POSTGRES_DB=ayalab \
            --from-literal=POSTGRES_USER=${{ secrets.DB_USERNAME }} \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -n ayalab \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Run database migrations
        # Runs Flyway as a one-off Job before the new Pods start
        # Safe: migrations must be backward-compatible with the old version still running
        run: |
          kubectl run flyway-migrate \
            --image=${{ needs.build-and-push.outputs.image }} \
            --restart=Never \
            --namespace=ayalab \
            --env="DB_URL=jdbc:postgresql://postgres:5432/ayalab" \
            --env="DB_USERNAME=${{ secrets.DB_USERNAME }}" \
            --env="DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
            --command -- java -cp /app/app.jar \
              -Dloader.main=org.flywaydb.core.Flyway \
              org.springframework.boot.loader.PropertiesLauncher migrate || true
          # Wait for migration job to complete
          kubectl wait --for=condition=Ready pod/flyway-migrate -n ayalab --timeout=120s || true
          kubectl delete pod flyway-migrate -n ayalab --ignore-not-found

      - name: Apply remaining manifests
        run: |
          kubectl apply -f k8s/postgres-pvc.yaml
          kubectl apply -f k8s/postgres-secret.yaml
          kubectl apply -f k8s/postgres-deployment.yaml
          kubectl apply -f k8s/postgres-service.yaml
          kubectl apply -f k8s/pdb.yaml

      - name: Deploy new image
        run: |
          # Set the exact image (git SHA tag, not :latest)
          kubectl set image deployment/ayalab-backend \
            ayalab-backend=${{ needs.build-and-push.outputs.image }} \
            -n ayalab

          # Annotate so kubectl rollout history is readable
          kubectl annotate deployment/ayalab-backend \
            kubernetes.io/change-cause="deploy ${{ github.sha }} by ${{ github.actor }}" \
            -n ayalab --overwrite

      - name: Apply backend service and HPA
        run: |
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Wait for rollout to complete
        # This blocks until all new pods are ready OR timeout is hit
        run: |
          kubectl rollout status deployment/ayalab-backend \
            -n ayalab \
            --timeout=300s

      - name: Rollback on failure
        # Only runs if the previous step failed
        if: failure()
        run: |
          echo "Deployment failed — rolling back to previous version"
          kubectl rollout undo deployment/ayalab-backend -n ayalab
          kubectl rollout status deployment/ayalab-backend -n ayalab --timeout=120s
