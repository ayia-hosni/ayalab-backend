name: Deploy Backend to Hetzner K8s

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ayahosny/ayalab-backend:latest
            ayahosny/ayalab-backend:${{ github.sha }}

  deploy:
    name: Deploy to Hetzner K8s
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_HETZNER }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create namespace
        run: |
          kubectl create namespace ayalab --dry-run=client -o yaml | kubectl apply -f -

      - name: Create postgres secret
        run: |
          kubectl create secret generic postgres-secret \
            --from-literal=POSTGRES_DB=ayalab \
            --from-literal=POSTGRES_USER=${{ secrets.DB_USERNAME }} \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -n ayalab \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply K8s manifests
        run: kubectl apply -f k8s/

      - name: Update backend image
        run: |
          kubectl set image deployment/ayalab-backend \
            ayalab-backend=ayahosny/ayalab-backend:${{ github.sha }} \
            -n ayalab

      - name: Wait for rollout
        run: kubectl rollout status deployment/ayalab-backend -n ayalab --timeout=120s
