apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ayalab-backend-hpa
  namespace: ayalab
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ayalab-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70   # scale up when avg CPU across pods exceeds 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
