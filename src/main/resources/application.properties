spring.application.name=ayalab-backend

# ---- PostgreSQL datasource ----
# Override any of these with environment variables when running.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ayalab}
spring.datasource.username=${DB_USERNAME:ayalab}
spring.datasource.password=${DB_PASSWORD:ayalab}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
# Flyway owns the schema, so Hibernate only validates it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ---- Flyway migrations ----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ---- Server ----
server.port=${SERVER_PORT:8080}
server.error.include-message=always

# ---- CORS — comma-separated list of allowed origins ----
app.cors.allowed-origins=${FRONTEND_ORIGINS:http://localhost:4200}

# ---- Paymob ----
paymob.api-key=${PAYMOB_API_KEY:your_api_key_here}
paymob.hmac-secret=${PAYMOB_HMAC_SECRET:your_hmac_secret_here}
paymob.base-url=${PAYMOB_BASE_URL:https://accept.paymob.com/api}
paymob.card-integration-id=${PAYMOB_CARD_INTEGRATION_ID:0}
paymob.card-iframe-id=${PAYMOB_CARD_IFRAME_ID:0}
paymob.wallet-integration-id=${PAYMOB_WALLET_INTEGRATION_ID:0}
paymob.kiosk-integration-id=${PAYMOB_KIOSK_INTEGRATION_ID:0}

# ---- OpenAPI / Swagger UI ----
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
