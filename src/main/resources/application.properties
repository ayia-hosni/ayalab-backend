spring.application.name=ayalab-backend

# ---- PostgreSQL datasource ----
# Override any of these with environment variables when running.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ayalab}
spring.datasource.username=${DB_USERNAME:ayalab}
spring.datasource.password=${DB_PASSWORD:ayalab}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
# Flyway owns the schema, so Hibernate only validates it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ---- Flyway migrations ----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ---- Server ----
server.port=${SERVER_PORT:8080}
server.error.include-message=always

# ---- CORS (Angular dev server) ----
app.cors.allowed-origin=${FRONTEND_ORIGIN:http://localhost:4200}
